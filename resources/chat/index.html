<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACE GUI</title>
  <link rel="stylesheet" href="qrc:///chat/chat.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <button id="new-session-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Session
      </button>
    </div>
    <div id="session-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <button id="sidebar-toggle" title="Toggle sidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <span id="topbar-title">ACE GUI</span>
      <button id="search-btn" title="Search conversation (⌘F)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button id="export-btn" title="Export transcript">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button id="view-selector-btn">
        <span id="view-selector-label">Normal</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

    <div id="search-bar">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search conversation…" autocomplete="off">
      <span id="search-count"></span>
      <button id="search-prev" title="Previous match (Shift+Enter)">↑</button>
      <button id="search-next" title="Next match (Enter)">↓</button>
      <button id="search-close" title="Close (Esc)">×</button>
    </div>

    <div id="messages" class="fs-md"></div>

    <button id="scroll-to-bottom" title="Scroll to bottom">↓</button>

    <div id="summary-view">
      <div id="summary-stats"></div>
      <div id="summary-last-turn"></div>
      <div id="summary-content"></div>
      <div id="summary-actions">
        <button id="generate-summary-btn">Generate summary</button>
        <button id="exit-summary-btn">Exit summary view</button>
      </div>
    </div>

    <div id="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <span class="typing-label">Claude is thinking…</span>
    </div>

    <div id="attachment-tray"></div>

    <div id="statusline">
      <span id="statusline-model">default</span>
      <div id="statusline-usage">
        <div id="statusline-bar-track">
          <div id="statusline-bar-fill"></div>
        </div>
        <span id="statusline-pct">—</span>
      </div>
      <span id="statusline-turns">—</span>
    </div>

    <div id="input-area">
      <div id="textarea-wrapper">
        <textarea id="input-textarea" rows="1"
                  placeholder="Message Claude…"></textarea>
      </div>
      <div id="input-toolbar">
        <button id="attach-btn" title="Attach images (or paste/drag)">📎</button>
        <button id="cwd-btn" title="Change working directory">~/</button>
        <div id="model-selector">
          <button id="model-btn">
            <span id="model-btn-label">Default</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div id="model-dropdown"></div>
        </div>
        <button id="perm-mode-btn" title="Permission mode">Safe</button>
        <button id="yolo-btn">YOLO</button>
        <button id="send-btn" title="Send (Enter)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
        <button id="stop-btn" title="Stop generation">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          Stop
        </button>
      </div>
    </div>
  </div>
</div>

<!-- View selector popup — outside #app so position:fixed works correctly -->
<div id="view-popup">
  <div class="view-popup-label">Transcript view</div>
  <div class="view-option" data-view="normal"><span>Normal</span><span class="view-check"></span></div>
  <div class="view-option" data-view="thinking"><span>Thinking</span><span class="view-check"></span></div>
  <div class="view-option" data-view="verbose"><span>Verbose</span><span class="view-check"></span></div>
  <div class="view-option" data-view="summary"><span>Summary</span><span class="view-check"></span></div>
  <div class="view-popup-divider"></div>
  <div class="view-popup-label">Font size</div>
  <div class="font-size-row">
    <button class="font-size-btn sm-btn" data-font="sm">Aa</button>
    <button class="font-size-btn md-btn" data-font="md">Aa</button>
    <button class="font-size-btn lg-btn" data-font="lg">Aa</button>
  </div>
</div>

<div id="image-preview-modal">
  <button id="image-preview-close" title="Close">×</button>
  <img id="image-preview-img" alt="">
  <div id="image-preview-caption"></div>
</div>

<div id="permission-modal">
  <div id="permission-card">
    <div id="permission-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span id="permission-header-label">Permission Required</span>
    </div>
    <div id="permission-tool-name"></div>
    <div id="permission-title"></div>
    <div id="permission-description"></div>
    <div id="permission-blocked-path"></div>
    <div id="permission-actions">
      <button id="permission-deny-btn">Deny</button>
      <button id="permission-allow-btn">Allow Once</button>
      <button id="permission-session-btn">Allow this session</button>
      <button id="permission-always-btn">Always Allow</button>
    </div>
  </div>
</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="qrc:///chat/marked.min.js"></script>
<script type="module" src="qrc:///chat/chat.js"></script>
</body>
</html>
