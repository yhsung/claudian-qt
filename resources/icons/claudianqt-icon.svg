<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>

    <!-- Background radial gradient: off-center upward for subtle sky depth -->
    <radialGradient id="bgBase" cx="50%" cy="42%" r="72%">
      <stop offset="0%"   stop-color="#1A1635"/>
      <stop offset="55%"  stop-color="#0D0B1E"/>
      <stop offset="100%" stop-color="#060611"/>
    </radialGradient>

    <!-- Edge vignette for depth -->
    <radialGradient id="bgEdge" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>

    <!-- Core bloom: large soft purple wash behind the star -->
    <radialGradient id="coreBloom" cx="50%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#4F46E5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>

    <!-- Top-left specular (Apple-style subtle highlight) -->
    <radialGradient id="specular" cx="28%" cy="16%" r="55%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Soft glow on constellation lines -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer node glow -->
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner node glow (tighter) -->
    <filter id="innerNodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Center starburst: wide bloom layer -->
    <filter id="starBloom" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- macOS squircle clip (22.4% corner radius = 229px at 1024px) -->
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="229" ry="229"/>
    </clipPath>

  </defs>

  <!--
    CONSTELLATION GEOMETRY
    Center: (512, 512)

    Outer ring — radius 340px, regular hexagon starting from top:
      Top:          (512,  172)
      Top-right:    (806,  342)
      Bottom-right: (806,  682)
      Bottom:       (512,  852)
      Bottom-left:  (218,  682)
      Top-left:     (218,  342)

    Inner ring — radius 192px, rotated 30° (interleaves with outer):
      30°:  (608, 346)
      90°:  (704, 512)
      150°: (608, 678)
      210°: (416, 678)
      270°: (320, 512)
      330°: (416, 346)

    Center starburst — 4-point star, outer radius 110px, inner radius 31px:
      0° top:    (512, 402)
      45°:       (534, 490)
      90° right: (622, 512)
      135°:      (534, 534)
      180° bot:  (512, 622)
      225°:      (490, 534)
      270° left: (402, 512)
      315°:      (490, 490)
  -->

  <g clip-path="url(#squircle)">

    <!-- ── Background ── -->
    <rect width="1024" height="1024" fill="url(#bgBase)"/>

    <!-- Faint atmospheric pulse rings -->
    <g fill="none" stroke="#4338CA" stroke-opacity="0.07">
      <circle cx="512" cy="512" r="200"/>
      <circle cx="512" cy="512" r="290"/>
      <circle cx="512" cy="512" r="380"/>
      <circle cx="512" cy="512" r="460"/>
    </g>

    <!-- Core purple bloom -->
    <rect width="1024" height="1024" fill="url(#coreBloom)"/>

    <!-- Edge darkening -->
    <rect width="1024" height="1024" fill="url(#bgEdge)"/>

    <!-- Top-left specular -->
    <rect width="1024" height="1024" fill="url(#specular)"/>

    <!-- ── Outer hexagon ring connections ── -->
    <g filter="url(#lineGlow)" stroke="#6D28D9" stroke-width="1.5"
       stroke-opacity="0.30" fill="none">
      <line x1="512" y1="172" x2="806" y2="342"/>
      <line x1="806" y1="342" x2="806" y2="682"/>
      <line x1="806" y1="682" x2="512" y2="852"/>
      <line x1="512" y1="852" x2="218" y2="682"/>
      <line x1="218" y1="682" x2="218" y2="342"/>
      <line x1="218" y1="342" x2="512" y2="172"/>
    </g>

    <!-- ── Inner → outer cross-web connections ── -->
    <g filter="url(#lineGlow)" stroke="#7C3AED" stroke-width="1.8"
       stroke-opacity="0.28" fill="none">
      <line x1="608" y1="346" x2="512" y2="172"/>
      <line x1="608" y1="346" x2="806" y2="342"/>
      <line x1="704" y1="512" x2="806" y2="342"/>
      <line x1="704" y1="512" x2="806" y2="682"/>
      <line x1="608" y1="678" x2="806" y2="682"/>
      <line x1="608" y1="678" x2="512" y2="852"/>
      <line x1="416" y1="678" x2="512" y2="852"/>
      <line x1="416" y1="678" x2="218" y2="682"/>
      <line x1="320" y1="512" x2="218" y2="682"/>
      <line x1="320" y1="512" x2="218" y2="342"/>
      <line x1="416" y1="346" x2="218" y2="342"/>
      <line x1="416" y1="346" x2="512" y2="172"/>
    </g>

    <!-- ── Center → inner ring spokes ── -->
    <g filter="url(#lineGlow)" stroke="#A78BFA" stroke-width="2.2"
       stroke-opacity="0.45" fill="none">
      <line x1="512" y1="512" x2="608" y2="346"/>
      <line x1="512" y1="512" x2="704" y2="512"/>
      <line x1="512" y1="512" x2="608" y2="678"/>
      <line x1="512" y1="512" x2="416" y2="678"/>
      <line x1="512" y1="512" x2="320" y2="512"/>
      <line x1="512" y1="512" x2="416" y2="346"/>
    </g>

    <!-- ── Outer ring nodes ── -->
    <g filter="url(#nodeGlow)">
      <circle cx="512" cy="172" r="22" fill="#7C3AED" opacity="0.50"/>
      <circle cx="512" cy="172" r="11" fill="#C4B5FD"/>

      <circle cx="806" cy="342" r="19" fill="#6D28D9" opacity="0.45"/>
      <circle cx="806" cy="342" r="9.5" fill="#A78BFA"/>

      <circle cx="806" cy="682" r="19" fill="#6D28D9" opacity="0.45"/>
      <circle cx="806" cy="682" r="9.5" fill="#A78BFA"/>

      <circle cx="512" cy="852" r="22" fill="#7C3AED" opacity="0.50"/>
      <circle cx="512" cy="852" r="11" fill="#C4B5FD"/>

      <circle cx="218" cy="682" r="19" fill="#6D28D9" opacity="0.45"/>
      <circle cx="218" cy="682" r="9.5" fill="#A78BFA"/>

      <circle cx="218" cy="342" r="19" fill="#6D28D9" opacity="0.45"/>
      <circle cx="218" cy="342" r="9.5" fill="#A78BFA"/>
    </g>

    <!-- ── Inner ring nodes (brighter, cooler blue-white) ── -->
    <g filter="url(#innerNodeGlow)">
      <circle cx="608" cy="346" r="13" fill="#818CF8" opacity="0.55"/>
      <circle cx="608" cy="346" r="6"  fill="#E0E7FF"/>

      <circle cx="704" cy="512" r="13" fill="#818CF8" opacity="0.55"/>
      <circle cx="704" cy="512" r="6"  fill="#E0E7FF"/>

      <circle cx="608" cy="678" r="13" fill="#818CF8" opacity="0.55"/>
      <circle cx="608" cy="678" r="6"  fill="#E0E7FF"/>

      <circle cx="416" cy="678" r="13" fill="#818CF8" opacity="0.55"/>
      <circle cx="416" cy="678" r="6"  fill="#E0E7FF"/>

      <circle cx="320" cy="512" r="13" fill="#818CF8" opacity="0.55"/>
      <circle cx="320" cy="512" r="6"  fill="#E0E7FF"/>

      <circle cx="416" cy="346" r="13" fill="#818CF8" opacity="0.55"/>
      <circle cx="416" cy="346" r="6"  fill="#E0E7FF"/>
    </g>

    <!-- ── Center 4-point starburst — 3 glow layers + core ── -->

    <!-- Layer 1: widest bloom (large gaussian spread) -->
    <g filter="url(#starBloom)">
      <path d="M 512,402  L 534,490  L 622,512  L 534,534
               L 512,622  L 490,534  L 402,512  L 490,490  Z"
            fill="#7C3AED" opacity="0.70"/>
    </g>

    <!-- Layer 2: medium glow -->
    <g filter="url(#nodeGlow)">
      <path d="M 512,418  L 532,488  L 606,512  L 532,536
               L 512,606  L 492,536  L 418,512  L 492,488  Z"
            fill="#A78BFA" opacity="0.85"/>
    </g>

    <!-- Layer 3: the crisp star shape -->
    <path d="M 512,402  L 534,490  L 622,512  L 534,534
             L 512,622  L 490,534  L 402,512  L 490,490  Z"
          fill="#DDD6FE"/>

    <!-- Center solid circle — ensures white dot survives at 16px -->
    <circle cx="512" cy="512" r="32" fill="white"/>

    <!-- Star arm highlights (brighten tips) -->
    <path d="M 512,428  L 530,490  L 512,512  L 494,490  Z" fill="white" opacity="0.70"/>
    <path d="M 596,512  L 534,530  L 512,512  L 534,494  Z" fill="white" opacity="0.70"/>
    <path d="M 512,596  L 494,534  L 512,512  L 530,534  Z" fill="white" opacity="0.70"/>
    <path d="M 428,512  L 490,494  L 512,512  L 490,530  Z" fill="white" opacity="0.70"/>

  </g>
</svg>
