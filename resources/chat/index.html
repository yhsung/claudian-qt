<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claudian Qt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1c1c1e;
      --bg2:         #2c2c2e;
      --bg3:         #3a3a3c;
      --text:        #f2f2f7;
      --text-muted:  #8e8e93;
      --accent:      #0a84ff;
      --green:       #30d158;
      --red:         #ff453a;
      --border:      #48484a;
      --radius:      14px;
      --font:        -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono:        "SF Mono", "Fira Code", "Consolas", monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── Header ──────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 42px;
    }

    #header .folder-icon { color: var(--text-muted); flex-shrink: 0; }

    #cwd-label {
      flex: 1;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #pick-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 7px;
      font-size: 12px;
      font-family: var(--font);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #pick-btn:hover { background: var(--border); }

    /* ── Messages ────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      pointer-events: none;
      text-align: center;
    }
    #empty-state svg { opacity: 0.4; }
    #empty-state .title   { font-size: 17px; font-weight: 600; color: var(--text); }
    #empty-state .sub     { font-size: 13px; line-height: 1.5; }
    #empty-state .hint    { font-size: 12px; font-family: var(--mono);
                            background: var(--bg2); padding: 4px 10px;
                            border-radius: 6px; margin-top: 4px; }

    /* ── Message rows ────────────────────────────────────────── */
    .msg-row { display: flex; flex-direction: column; gap: 6px; }
    .msg-row.user      { align-items: flex-end; }
    .msg-row.assistant { align-items: flex-start; }

    /* ── Bubbles ─────────────────────────────────────────────── */
    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .bubble {
      background: var(--bg2);
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ────────────────────────────────────── */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg2);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.35; }
      30%            { transform: translateY(-5px); opacity: 1;    }
    }

    /* ── Tool call block ─────────────────────────────────────── */
    .tool-block {
      max-width: 72%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 8px;
      overflow: hidden;
      font-size: 12px;
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      cursor: pointer;
      user-select: none;
    }
    .tool-header:hover { background: rgba(255,255,255,0.04); }

    .tool-spinner {
      width: 8px; height: 8px;
      border: 2px solid var(--green);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .tool-spinner.done { animation: none; border-color: var(--green); border-top-color: var(--green); background: var(--green); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tool-name { color: var(--green); font-family: var(--mono); font-weight: 600; }

    .tool-chevron {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 14px;
      transition: transform 0.18s;
      line-height: 1;
    }
    .tool-block.open .tool-chevron { transform: rotate(90deg); }

    .tool-body {
      display: none;
      padding: 8px 10px;
      border-top: 1px solid var(--border);
    }
    .tool-block.open .tool-body { display: block; }

    .tool-body pre {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }

    /* ── Error ───────────────────────────────────────────────── */
    .error-msg {
      padding: 9px 13px;
      background: rgba(255, 69, 58, 0.12);
      border: 1px solid var(--red);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      max-width: 72%;
    }

    /* ── Input area ──────────────────────────────────────────── */
    #input-area {
      padding: 12px 14px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      padding: 10px 13px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 160px;
      overflow-y: auto;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }
    #input:disabled { opacity: 0.5; }

    #send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:disabled { background: var(--bg3); cursor: not-allowed; }
    #send-btn svg { pointer-events: none; }

    /* Abort button shown while streaming */
    #send-btn.abort { background: var(--red); }

    /* ── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <svg class="folder-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>
    <span id="cwd-label">~/</span>
    <button id="pick-btn">Open Folder</button>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <div class="title">Claudian Qt</div>
      <div class="sub">Claude Code running in your Qt app.<br>Open a folder and start chatting.</div>
      <div class="hint">Ctrl+Enter to send</div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <textarea id="input" placeholder="Message Claude… (Ctrl+Enter to send)" rows="1" disabled></textarea>
    <button id="send-btn" disabled title="Send (Ctrl+Enter)">
      <!-- Send icon -->
      <svg id="icon-send" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      <!-- Stop icon (shown while streaming) -->
      <svg id="icon-stop" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"
           style="display:none">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
      </svg>
    </button>
  </div>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    // ── State ─────────────────────────────────────────────────────
    let bridge       = null;
    let streaming    = false;
    let currentRow   = null;  // assistant row being built
    let currentBubble = null; // text bubble inside currentRow

    // ── DOM refs ──────────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('empty-state');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send-btn');
    const cwdLabel   = document.getElementById('cwd-label');
    const iconSend   = document.getElementById('icon-send');
    const iconStop   = document.getElementById('icon-stop');

    // ── Helpers ───────────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function scrollBottom() {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    }

    function hideEmpty() {
      if (emptyState.parentNode) emptyState.remove();
    }

    function setStreaming(on) {
      streaming = on;
      inputEl.disabled = on;
      sendBtn.disabled = !on && !inputEl.value.trim();
      sendBtn.classList.toggle('abort', on);
      iconSend.style.display = on ? 'none' : '';
      iconStop.style.display = on ? ''     : 'none';
      sendBtn.title = on ? 'Stop (Esc)' : 'Send (Ctrl+Enter)';
      if (!on) inputEl.focus();
    }

    // ── User bubble ───────────────────────────────────────────────
    function appendUserBubble(text) {
      hideEmpty();
      const row = document.createElement('div');
      row.className = 'msg-row user';
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = text;
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollBottom();
    }

    // ── Begin assistant turn ──────────────────────────────────────
    function beginAssistantTurn() {
      hideEmpty();
      currentRow    = document.createElement('div');
      currentRow.className = 'msg-row assistant';
      currentBubble = null;

      // Typing indicator until first content arrives
      const typing  = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing-indicator';
      typing.innerHTML =
        '<div class="typing-dot"></div>' +
        '<div class="typing-dot"></div>' +
        '<div class="typing-dot"></div>';
      currentRow.appendChild(typing);
      messagesEl.appendChild(currentRow);
      scrollBottom();
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    function ensureBubble() {
      if (currentBubble) return;
      removeTyping();
      currentBubble = document.createElement('div');
      currentBubble.className = 'bubble';
      // Insert before any tool blocks
      currentRow.insertBefore(currentBubble, currentRow.firstChild);
    }

    // ── Signal handlers (called from C++ via QWebChannel) ─────────
    function onTextReady(text) {
      if (!currentRow) beginAssistantTurn();
      ensureBubble();
      currentBubble.textContent += text;
      scrollBottom();
    }

    function onToolUse(name, inputJson) {
      if (!currentRow) beginAssistantTurn();
      removeTyping();

      let formatted = inputJson;
      try { formatted = JSON.stringify(JSON.parse(inputJson), null, 2); } catch (_) {}

      const block = document.createElement('div');
      block.className = 'tool-block';
      block.innerHTML =
        '<div class="tool-header">' +
          '<div class="tool-spinner"></div>' +
          '<span class="tool-name">' + esc(name) + '</span>' +
          '<span class="tool-chevron">›</span>' +
        '</div>' +
        '<div class="tool-body"><pre>' + esc(formatted) + '</pre></div>';

      block.querySelector('.tool-header').addEventListener('click', () => {
        block.classList.toggle('open');
      });

      currentRow.appendChild(block);
      scrollBottom();
    }

    function onTurnComplete() {
      removeTyping();
      if (currentRow) {
        currentRow.querySelectorAll('.tool-spinner').forEach(s => s.classList.add('done'));
      }
      currentRow    = null;
      currentBubble = null;
      setStreaming(false);
    }

    function onErrorOccurred(msg) {
      removeTyping();
      currentRow    = null;
      currentBubble = null;

      hideEmpty();
      const err = document.createElement('div');
      err.className = 'error-msg';
      err.textContent = '⚠ ' + msg;
      messagesEl.appendChild(err);
      scrollBottom();
      setStreaming(false);
    }

    function onCwdChanged(path) {
      // Shorten home dir to ~
      const home = path.match(/^\/Users\/[^/]+/) || path.match(/^\/home\/[^/]+/);
      cwdLabel.textContent = home ? path.replace(home[0], '~') : path;
    }

    // ── Send / Abort ──────────────────────────────────────────────
    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !bridge) return;

      inputEl.value = '';
      autoResize();
      setStreaming(true);

      appendUserBubble(text);
      beginAssistantTurn();

      bridge.sendMessage(text);
    }

    function handleSendBtn() {
      if (streaming) {
        bridge.abort();
      } else {
        sendMessage();
      }
    }

    // ── Input auto-resize ─────────────────────────────────────────
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    }

    inputEl.addEventListener('input', () => {
      autoResize();
      if (!streaming) sendBtn.disabled = !inputEl.value.trim();
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); }
      if (e.key === 'Escape' && streaming) { bridge.abort(); }
    });

    sendBtn.addEventListener('click', handleSendBtn);
    document.getElementById('pick-btn').addEventListener('click', () => {
      if (bridge) bridge.pickFolder();
    });

    // ── QWebChannel bootstrap ─────────────────────────────────────
    new QWebChannel(qt.webChannelTransport, function(channel) {
      bridge = channel.objects.claude;

      bridge.textReady.connect(onTextReady);
      bridge.toolUse.connect(onToolUse);
      bridge.turnComplete.connect(onTurnComplete);
      bridge.errorOccurred.connect(onErrorOccurred);
      bridge.cwdChanged.connect(onCwdChanged);

      // Sync initial CWD (Q_PROPERTY value sent on init)
      onCwdChanged(bridge.cwd);

      setStreaming(false);
      inputEl.focus();
    });
  </script>
</body>
</html>
