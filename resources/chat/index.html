<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claudian Qt</title>
  <link rel="stylesheet" href="qrc:///chat/chat.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <button id="new-session-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Session
      </button>
    </div>
    <div id="session-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <span id="topbar-title">Claudian Qt</span>
      <button id="view-selector-btn">
        <span id="view-selector-label">Normal</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

    <div id="messages" class="fs-md"></div>

    <div id="summary-view">
      <div id="summary-stats"></div>
      <div id="summary-last-turn"></div>
      <div id="summary-content"></div>
      <div id="summary-actions">
        <button id="generate-summary-btn">Generate summary</button>
        <button id="exit-summary-btn">Exit summary view</button>
      </div>
    </div>

    <div id="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <span class="typing-label">Claude is thinking…</span>
    </div>

    <div id="input-area">
      <div id="textarea-wrapper">
        <textarea id="input-textarea" rows="1"
                  placeholder="Message Claude…"></textarea>
      </div>
      <div id="input-toolbar">
        <button id="cwd-btn" title="Change working directory">~/</button>
        <div id="model-selector">
          <button id="model-btn">
            <span id="model-btn-label">Default</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div id="model-dropdown"></div>
        </div>
        <button id="yolo-btn">Safe</button>
        <button id="send-btn" title="Send (Enter)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
        <button id="stop-btn" title="Stop generation">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          Stop
        </button>
      </div>
    </div>
  </div>
</div>

<!-- View selector popup — outside #app so position:fixed works correctly -->
<div id="view-popup">
  <div class="view-popup-label">Transcript view</div>
  <div class="view-option" data-view="normal"><span>Normal</span><span class="view-check"></span></div>
  <div class="view-option" data-view="thinking"><span>Thinking</span><span class="view-check"></span></div>
  <div class="view-option" data-view="verbose"><span>Verbose</span><span class="view-check"></span></div>
  <div class="view-option" data-view="summary"><span>Summary</span><span class="view-check"></span></div>
  <div class="view-popup-divider"></div>
  <div class="view-popup-label">Font size</div>
  <div class="font-size-row">
    <button class="font-size-btn sm-btn" data-font="sm">Aa</button>
    <button class="font-size-btn md-btn" data-font="md">Aa</button>
    <button class="font-size-btn lg-btn" data-font="lg">Aa</button>
  </div>
</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="qrc:///chat/marked.min.js"></script>
<script src="qrc:///chat/chat.js"></script>
</body>
</html>
