<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claudian Qt</title>
  <!-- Claudian design system styles -->
  <link rel="stylesheet" href="qrc:///claudian/styles.css">
  <style>
    /* Obsidian CSS variable defaults — Claudian's styles.css relies on these */
    :root {
      --background-primary:              #1c1c1e;
      --background-primary-alt:          #141416;
      --background-secondary:            #2c2c2e;
      --background-secondary-alt:        #3a3a3c;
      --background-modifier-border:      #48484a;
      --background-modifier-border-hover:#5a5a5c;
      --background-modifier-border-focus:#7c6af7;
      --background-modifier-hover:       rgba(255,255,255,0.06);
      --background-modifier-error:       #3d1f1f;
      --text-normal:      #dcddde;
      --text-muted:       #8e8e93;
      --text-faint:       #636366;
      --text-accent:      #7c6af7;
      --text-accent-hover:#9d8fff;
      --text-error:       #ff453a;
      --text-on-accent:   #ffffff;
      --text-selection:   rgba(124,106,247,0.25);
      --interactive-accent:       #7c6af7;
      --interactive-accent-hover: #9d8fff;
      --link-color:               #7c6af7;
      --color-red:        #ff453a;
      --color-red-rgb:    255,69,58;
      --color-orange:     #ff9f0a;
      --color-yellow:     #ffd60a;
      --color-green:      #30d158;
      --font-text:        -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-monospace:   'SF Mono', SFMono-Regular, ui-monospace, monospace;
      --font-ui-small:    12px;
      --font-ui-medium:   13px;
      --font-ui-smaller:  11px;
      --font-medium:      500;
      --font-semibold:    600;
      --radius-s:         4px;
    }

    html, body {
      margin: 0; padding: 0;
      height: 100vh; width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--background-primary, #1c1c1e);
      color: var(--text-normal, #dcddde);
    }
    /* qt-toolbar is flex-shrink: 0 (set below), claudian-root fills the rest */
    #claudian-root {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    /* Ensure ClaudianView fills the root container */
    #claudian-root > .view-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #claudian-root .claudian-container {
      height: 100%;
    }
    /* Thin cwd / folder bar above the view */
    #qt-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--background-secondary, #2c2c2e);
      border-bottom: 1px solid var(--background-modifier-border, #48484a);
      flex-shrink: 0; /* stays fixed; claudian-root gets remaining height */
      font-size: 11px;
      font-family: var(--font-monospace, monospace);
    }
    #qt-cwd {
      flex: 1;
      color: var(--text-muted, #999);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #qt-pick-btn {
      background: var(--background-secondary-alt, #3a3a3c);
      border: 1px solid var(--background-modifier-border, #48484a);
      color: var(--text-normal, #dcddde);
      cursor: pointer;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #qt-pick-btn:hover { opacity: 0.8; }
    #qt-error {
      color: #ff453a;
      padding: 16px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    /* Send button injected into .claudian-input-toolbar */
    .qt-send-btn {
      margin-left: auto;
      cursor: pointer;
      padding: 3px 5px;
      display: flex;
      align-items: center;
      color: var(--text-muted, #999);
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .qt-send-btn:hover { color: var(--interactive-accent, #7c6af7); }
  </style>
</head>
<body>

<div id="qt-toolbar">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="color:var(--text-muted,#999);flex-shrink:0">
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
  </svg>
  <span id="qt-cwd">~/</span>
  <button id="qt-pick-btn">Open Folder</button>
</div>

<div id="claudian-root"></div>

<!-- Load order: QWebChannel → Obsidian shim → Claudian bundle → bootstrap -->
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="qrc:///chat/obsidian-shim.js"></script>
<script src="qrc:///claudian/main.js"></script>
<script>
'use strict';

// ── Qt Bridge Service ──────────────────────────────────────────────────────
// Replaces ClaudianService. Async-generator query() pumps chunks from C++
// QWebChannel signals instead of spawning its own claude subprocess.
class QtBridgeService {
  constructor(bridge) {
    this._bridge  = bridge;
    this._queue   = [];
    this._waiter  = null;

    this._onText  = (text) => this._enqueue({ type: 'text', content: text });
    this._onTool  = (name, json) => {
      let input = {};
      try { input = JSON.parse(json); } catch (_) {}
      this._enqueue({ type: 'tool_use', id: String(Date.now()), name, input });
    };
    this._onDone  = ()    => this._enqueue({ type: 'done' });
    this._onError = (msg) => this._enqueue({ type: 'error', msg });

    bridge.textReady.connect(this._onText);
    bridge.toolUse.connect(this._onTool);
    bridge.turnComplete.connect(this._onDone);
    bridge.errorOccurred.connect(this._onError);
  }

  _enqueue(chunk) {
    if (this._waiter) {
      const r = this._waiter; this._waiter = null; r(chunk);
    } else {
      this._queue.push(chunk);
    }
  }

  _next() {
    if (this._queue.length) return Promise.resolve(this._queue.shift());
    return new Promise(r => { this._waiter = r; });
  }

  async *query(prompt, images, history, opts) {
    // Flush any stale chunks from a previous aborted turn.
    this._queue = []; this._waiter = null;
    this._bridge.sendMessage(prompt);
    for (;;) {
      const chunk = await this._next();
      if (chunk.type === 'done')  return;
      if (chunk.type === 'error') throw new Error(chunk.msg);
      yield chunk;
    }
  }

  abort() {
    this._bridge.abort();
    this._enqueue({ type: 'done' });
  }

  // Stubs expected by InputController / other callers
  async ensureReady()          {}
  isReady()                    { return true; }
  onReadyStateChange(cb)       { return () => {}; }
  registerResponseHandler()    { return () => {}; }
  getSessionId()               { return ''; }
  getEffectiveModel()          { return ''; }

  destroy() {
    try { this._bridge.textReady.disconnect(this._onText); }    catch (_) {}
    try { this._bridge.toolUse.disconnect(this._onTool); }      catch (_) {}
    try { this._bridge.turnComplete.disconnect(this._onDone); } catch (_) {}
    try { this._bridge.errorOccurred.disconnect(this._onError); } catch (_) {}
  }
}

// ── Inject Qt service into a ClaudianView tab ──────────────────────────────
function injectQtServiceIntoTab(tab, qtService) {
  if (!tab) return;
  // Replace the service on the tab
  tab.service = qtService;

  const ic = tab.controllers?.inputController;
  if (!ic) return;
  // Patch whichever property/method InputController uses to retrieve the service
  if ('getAgentService' in ic) ic.getAgentService = () => qtService;
  if ('agentService'   in ic) ic.agentService    = qtService;
  // Also handle stream controller if it holds its own service ref
  const sc = tab.controllers?.streamController;
  if (sc && 'service' in sc) sc.service = qtService;
}

// ── Main bootstrap (async IIFE) ────────────────────────────────────────────
(async function bootstrap() {
  // ── 1. Retrieve ClaudianPlugin from main.js CommonJS exports ──────────
  const ClaudianPlugin = window.module?.exports?.default;
  if (typeof ClaudianPlugin !== 'function') {
    document.getElementById('claudian-root').innerHTML =
      '<div id="qt-error">Failed to load ClaudianPlugin from main.js.\nCheck browser console for errors.</div>';
    return;
  }

  // ── 2. Build mock App object ───────────────────────────────────────────
  const mockApp = {
    vault: {
      adapter: {
        basePath: '/',
        exists:   (p)    => Promise.resolve(false),
        read:     (p)    => Promise.resolve(''),
        write:    (p, d) => Promise.resolve(),
        mkdir:    (p)    => Promise.resolve(),
        list:     (p)    => Promise.resolve({ files: [], folders: [] }),
        stat:     (p)    => Promise.resolve({ type: 'file', size: 0, mtime: 0, ctime: 0 }),
        remove:   (p)    => Promise.resolve(),
        copy:     (f, t) => Promise.resolve(),
        rename:   (f, t) => Promise.resolve(),
      },
      configDir: '.obsidian',
      on()      { return { unsubscribe() {} }; },
      off()     {},
      read:                (f) => Promise.resolve(''),
      cachedRead:          (f) => Promise.resolve(''),
      modify:              (f, d) => Promise.resolve(),
      create:              (p, d) => Promise.resolve(new window.__obsidian__.TFile(p)),
      createBinary:        (p, d) => Promise.resolve(new window.__obsidian__.TFile(p)),
      delete:              (f, force) => Promise.resolve(),
      trash:               (f, sys) => Promise.resolve(),
      exists:              (p) => Promise.resolve(false),
      createFolder:        (p) => Promise.resolve(),
      rename:              (f, n) => Promise.resolve(),
      copy:                (f, t) => Promise.resolve(new window.__obsidian__.TFile(t)),
      getFiles:            () => [],
      getAllLoadedFiles:    () => [],
      getMarkdownFiles:    () => [],
      getAbstractFileByPath: () => null,
      getFileByPath:       () => null,
      getFolderByPath:     () => null,
      getRoot:             () => new window.__obsidian__.TFolder('/'),
    },
    workspace: {
      activeLeaf:   null,
      activeEditor: null,
      getLeavesOfType:     () => [],
      revealLeaf:          () => Promise.resolve(),
      getActiveFile:       () => null,
      getActiveViewOfType: () => null,
      getMostRecentLeaf:   () => null,
      getLeaf:             () => null,
      iterateAllLeaves:    () => {},
      on()     { return { unsubscribe() {} }; },
      off()    {},
      trigger() {},
      openLinkText: () => Promise.resolve(),
      openPopoutLeaf: () => null,
    },
    metadataCache: {
      getFileCache:       () => null,
      getCache:           () => null,
      resolvedLinks:      {},
      unresolvedLinks:    {},
      on()   { return { unsubscribe() {} }; },
      off()  {},
      trigger() {},
    },
    fileManager: {
      processFrontMatter: () => Promise.resolve(),
      generateMarkdownLink: () => '',
    },
    keymap: { pushScope() {}, popScope() {} },
    scope:  { register() {} },
    plugins: { enabledPlugins: new Set(), plugins: {} },
    internalPlugins: { getPluginById: () => null },
    commands: { addCommand() {}, removeCommand() {}, executeCommandById() {} },
    setting:  { open() {}, close() {} },
  };

  // ── 3. Instantiate ClaudianPlugin ──────────────────────────────────────
  const mockManifest = { id: 'claudian-qt', name: 'Claudian Qt', version: '1.0.0', minAppVersion: '1.0.0', description: '', author: '' };
  let plugin;
  try {
    plugin = new ClaudianPlugin(mockApp, mockManifest);
  } catch (e) {
    document.getElementById('claudian-root').innerHTML =
      `<div id="qt-error">ClaudianPlugin constructor failed:\n${e.stack || e}</div>`;
    return;
  }

  // ── 4. Capture registerView factory early in case onload() throws later ─
  let viewFactory = null;
  const _origRegisterView = plugin.registerView?.bind(plugin);
  plugin.registerView = function(type, factory) {
    plugin._viewFactories = plugin._viewFactories || {};
    plugin._viewFactories[type] = factory;
    if (type === 'claudian-view') viewFactory = factory;
    _origRegisterView?.(type, factory);
  };

  // ── 5. Call onload() — some async operations may fail silently ─────────
  try {
    await plugin.onload();
  } catch (e) {
    console.warn('[claudian-qt] plugin.onload() threw (continuing):', e);
  }

  // Fallback: check _viewFactories if registerView patch didn't fire
  if (!viewFactory) {
    viewFactory = plugin._viewFactories?.['claudian-view'];
  }

  if (typeof viewFactory !== 'function') {
    document.getElementById('claudian-root').innerHTML =
      '<div id="qt-error">ClaudianView factory not registered.\nIs plugin.onload() calling registerView()?</div>';
    return;
  }

  // ── 6. Create fake leaf and instantiate ClaudianView ──────────────────
  const rootEl = document.getElementById('claudian-root');
  const leaf = {
    app:            mockApp,
    containerEl:    rootEl,
    parent:         null,
    view:           null,
    tabHeaderEl:    null,
    getDisplayText: () => 'Claudian',
    getViewType:    () => 'claudian-view',
  };

  let view;
  try {
    view = viewFactory(leaf);
    leaf.view = view;
  } catch (e) {
    rootEl.innerHTML = `<div id="qt-error">ClaudianView instantiation failed:\n${e.stack || e}</div>`;
    return;
  }

  // ── 7. Open the view (builds DOM) ─────────────────────────────────────
  try {
    await view.onOpen();
  } catch (e) {
    console.warn('[claudian-qt] view.onOpen() threw (continuing):', e);
  }

  // ── 8. Bootstrap QWebChannel ──────────────────────────────────────────
  new QWebChannel(qt.webChannelTransport, function(channel) {
    const bridge = channel.objects.claude;
    window.__qtBridge__ = bridge;

    // ── cwd display and pick button ──────────────────────────────────────
    const cwdEl   = document.getElementById('qt-cwd');
    const pickBtn = document.getElementById('qt-pick-btn');

    function updateCwd(path) {
      mockApp.vault.adapter.basePath = path;
      if (cwdEl) {
        const home = path.match(/^\/Users\/[^/]+/) || path.match(/^\/home\/[^/]+/);
        cwdEl.textContent = home ? path.replace(home[0], '~') : path;
      }
      // Propagate to plugin if it caches vault path
      try { if (plugin.vaultPath !== undefined) plugin.vaultPath = path; } catch (_) {}
    }

    bridge.cwdChanged.connect(updateCwd);
    updateCwd(bridge.cwd);

    pickBtn.addEventListener('click', () => bridge.pickFolder());

    // ── Inject Qt service into the active (and future) tabs ───────────
    const qtService = new QtBridgeService(bridge);

    function injectIntoActiveTab() {
      const tabManager = view.getTabManager?.();
      if (!tabManager) return;
      const tab = tabManager.getActiveTab?.();
      injectQtServiceIntoTab(tab, qtService);
    }

    injectIntoActiveTab();

    // Inject into tabs created after initial load
    // Monkey-patch TabManager.createTab if accessible
    const tabManager = view.getTabManager?.();
    if (tabManager && typeof tabManager.createTab === 'function') {
      const origCreate = tabManager.createTab.bind(tabManager);
      tabManager.createTab = async function(...args) {
        const result = await origCreate(...args);
        injectIntoActiveTab();
        return result;
      };
    }

    // ── Wire model selector → bridge ──────────────────────────────────
    // Map Claudian display names to claude CLI shorthand values
    const MODEL_LABEL_MAP = { 'opus': 'opus', 'opus 1m': 'opus', 'sonnet': 'sonnet', 'sonnet 1m': 'sonnet', 'haiku': 'haiku' };

    function syncModelToUI(modelVal) {
      if (!modelVal) return;
      const needle = modelVal.toLowerCase();
      document.querySelectorAll('.claudian-model-option').forEach(opt => {
        const label = (opt.querySelector('span')?.textContent || '').toLowerCase().trim();
        const optVal = MODEL_LABEL_MAP[label] || label;
        const match  = optVal === needle || needle.includes(label);
        opt.classList.toggle('selected', match);
        if (match) {
          const btnLabel = opt.closest('.claudian-model-selector')?.querySelector('.claudian-model-label');
          if (btnLabel) btnLabel.textContent = opt.querySelector('span')?.textContent || '';
        }
      });
    }

    document.querySelector('.claudian-input-toolbar')?.addEventListener('click', e => {
      const opt = e.target.closest('.claudian-model-option');
      if (!opt) return;
      const label    = (opt.querySelector('span')?.textContent || '').toLowerCase().trim();
      const modelVal = MODEL_LABEL_MAP[label] || label;
      bridge.setModel(modelVal);
      syncModelToUI(modelVal);
    });

    bridge.modelChanged.connect(syncModelToUI);
    syncModelToUI(bridge.model);

    // ── Wire YOLO toggle → bridge ──────────────────────────────────────
    const toggleSwitch = document.querySelector('.claudian-permission-toggle .claudian-toggle-switch');
    let syncingYolo = false;
    if (toggleSwitch) {
      new MutationObserver(() => {
        if (syncingYolo) return;
        bridge.setYolo(toggleSwitch.classList.contains('active'));
      }).observe(toggleSwitch, { attributes: true, attributeFilter: ['class'] });

      bridge.yoloChanged.connect(isYolo => {
        syncingYolo = true;
        toggleSwitch.classList.toggle('active', isYolo);
        const lbl = document.querySelector('.claudian-permission-label');
        if (lbl) lbl.textContent = isYolo ? 'YOLO' : 'Safe';
        syncingYolo = false;
      });

      // Sync initial bridge state → UI
      syncingYolo = true;
      toggleSwitch.classList.toggle('active', bridge.yolo);
      const permLabel = document.querySelector('.claudian-permission-label');
      if (permLabel) permLabel.textContent = bridge.yolo ? 'YOLO' : 'Safe';
      syncingYolo = false;
    }

    // ── Polish model button: add chevron + ready class ────────────────
    const modelBtn = document.querySelector('.claudian-model-btn');
    if (modelBtn && !modelBtn.querySelector('.claudian-model-chevron')) {
      modelBtn.classList.add('ready');
      const chevron = document.createElement('span');
      chevron.className = 'claudian-model-chevron';
      chevron.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
      modelBtn.appendChild(chevron);
    }

    // ── Inject send button into input toolbar ─────────────────────────
    const inputToolbar = document.querySelector('.claudian-input-toolbar');
    if (inputToolbar && !inputToolbar.querySelector('.qt-send-btn')) {
      const sendBtn = document.createElement('div');
      sendBtn.className  = 'qt-send-btn';
      sendBtn.title      = 'Send message (Enter)';
      sendBtn.setAttribute('aria-label', 'Send message');
      sendBtn.innerHTML  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
      sendBtn.addEventListener('click', () => {
        const tm  = view.getTabManager?.();
        const tab = tm?.getActiveTab?.();
        tab?.controllers?.inputController?.sendMessage?.();
      });
      inputToolbar.appendChild(sendBtn);
    }
  });
})();
</script>
</body>
</html>
